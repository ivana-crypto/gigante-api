services:
  - type: web
    name: gigante-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TRIPLESEAT_CONSUMER_KEY
        sync: false
      - key: TRIPLESEAT_CONSUMER_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        value: ivana@gigantehospitality.com
      - key: NOTIFY_EMAIL_CC
        value: albano@gigantehospitality.com
      - key: ALLOWED_ORIGIN
        value: "*"
